<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Frontend Mentor &vert; NFT Preview Card Component</title>

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="assets/images/favicon-32x32.png"
    />

    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <main>
      <article class="nft-component wrapper">
        <img
          src="assets/images/image-equilibrium.jpg"
          alt="An image of the equilibrium NFT #3429"
        />

        <h1 class="title">Equilibrium #3429</h1>
        <p>Our Equilibrium collection promotes balance and calm.</p>

        <ul>
          <li>
            <img
              src="assets/images/icon-ethereum.svg"
              alt=""
              aria-hidden="true"
            />

            0.041ETH
          </li>

          <li>
            <img src="assets/images/icon-clock.svg" alt="" aria-hidden="true" />

            3 days left
          </li>
        </ul>

        <hr />

        <img
          src="assets/images/image-avatar.png"
          alt="Avatar image of Jules Wyvern"
        />

        Creation of <a href="#">Jules Wyvern</a>
      </article>
    </main>

    <script src="js/scripts.js"></script>
  </body>
</html>
